<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message envoyé | Theina3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Questrial&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #ff6b35; /* Ajuste avec ton code couleur exact */
            --sombre: #2d3436;
        }
        body {
            font-family: 'Questrial', sans-serif;
            background-color: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .success-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        .icon {
            font-size: 50px;
            color: #4CAF50;
            margin-bottom: 20px;
        }
        h1 {
            font-family: 'Bree Serif', serif;
            color: var(--sombre);
            margin-bottom: 10px;
        }
        p {
            color: #636e72;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            background-color: var(--orange);
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s;
            display: inline-block;
        }
        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon">✓</div>
        <h1>Message reçu !</h1>
        <p>Merci de votre confiance. Votre projet a bien été transmis à l'atelier <strong>Theina3D</strong>. Je reviens vers vous par mail sous 24h à 48h pour discuter des détails techniques.</p>
        <a href="index.html" class="btn">Retour à l'accueil</a>
    </div>

</body>
</html>
