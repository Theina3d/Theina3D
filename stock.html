<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theina3D | Gestion des Stocks</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Questrial&display=swap" rel="stylesheet">
    <style>
        .grid-stock { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-top: 20px; }
        .stock-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        .stock-table th, .stock-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .stock-table th { background: var(--violet); color: white; }
        .status-low { color: #d9534f; font-weight: bold; background: #f9ebeb; }
        .btn-action { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-valider { background: #5cb85c; color: white; }
        .btn-suppr { background: #d9534f; color: white; }
    </style>
</head>
<body>

<nav>
    <div class="container nav-content">
        <a href="index.html" class="logo-zone"><span class="logo-nom">Theina<span>3D</span> Stock</span></a>
        <a href="calculpvu.html" style="color: white; text-decoration: none;">⬅ Retour Calculateur</a>
    </div>
</nav>

<div class="container" style="padding: 100px 20px 40px 20px; max-width: 1200px;">
    <div class="grid-stock">
        <div class="card">
            <h3 class="section-title">📦 Nouvel Arrivage</h3>
            <div class="form-group"><label>Matière</label><input type="text" id="add_mat" class="highlight-input" placeholder="ex: PLA"></div>
            <div class="form-group"><label>Couleur</label><input type="text" id="add_col" class="highlight-input" placeholder="ex: Noir"></div>
            <div class="grid-2">
                <div class="form-group"><label>Qté (g)</label><input type="number" id="add_qty" class="highlight-input" value="1000"></div>
                <div class="form-group"><label>Prix/kg</label><input type="number" id="add_price" class="highlight-input" value="25"></div>
            </div>
            <div class="form-group"><label>Fournisseur</label><input type="text" id="add_supplier" class="highlight-input" placeholder="Amazon, Sunlu..."></div>
            <button class="btn-save" onclick="uiAjouterStock()">Enregistrer l'achat</button>
        </div>

        <div class="card">
            <h3 class="section-title">📋 Inventaire Actuel</h3>
            <table class="stock-table">
                <thead>
                    <tr><th>Référence</th><th>Stock</th><th>Prix/kg</th><th>Action</th></tr>
                </thead>
                <tbody id="stock_body"></tbody>
            </table>

            <h3 class="section-title" style="margin-top: 30px;">⏳ Sorties à valider (Devis)</h3>
            <div id="attente_list"></div>
        </div>
    </div>
</div>

<script src="stock.js"></script>
</body>
</html>
