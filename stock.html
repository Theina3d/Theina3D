<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theina3D | Gestion des Stocks</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Questrial&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* Styles spécifiques à l'interface de gestion */
        .grid-stock { 
            display: grid; 
            grid-template-columns: 350px 1fr; 
            gap: 30px; 
            align-items: start;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
        }

        .status-low { 
            background: #ffebee !important; 
            color: #c62828; 
            font-weight: bold; 
        }

        /* Action Buttons dans le tableau */
        .btn-action {
            padding: 5px 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            transition: var(--transition);
        }
        .btn-valider { background: var(--vert); color: white; }
        .btn-suppr { background: #e53935; color: white; margin-left: 5px; }
        .btn-action:hover { opacity: 0.8; transform: translateY(-1px); }

        @media (max-width: 992px) {
            .grid-stock { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <div class="container nav-content">
        <a href="index.html" class="logo-zone">
            <span class="logo-nom">Theina<span>3D</span> Stock</span>
        </a>
        <a href="calculpvu.html" style="color: var(--violet); text-decoration: none; font-weight: bold;">⬅ Retour Calculateur</a>
    </div>
</nav>

<main class="container" style="padding-top: 40px; padding-bottom: 40px;">
    
    <header style="margin-bottom: 30px;">
        <span class="badge-tag" style="background: var(--violet-clair); color: var(--violet);">Atelier</span>
        <h1>Gestion de l'<em>Inventaire</em></h1>
    </header>

    <div class="grid-stock">
        
        <aside class="card">
            <h3 style="margin-bottom: 20px;">📦 Nouvel Arrivage</h3>
            <div class="form-group">
                <label>Matière</label>
                <input type="text" id="add_mat" placeholder="ex: PLA, PETG...">
            </div>
            <div class="form-group">
                <label>Couleur / Nom</label>
                <input type="text" id="add_col" placeholder="ex: Noir Galaxy">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group">
                    <label>Qté (g)</label>
                    <input type="number" id="add_qty" value="1000">
                </div>
                <div class="form-group">
                    <label>Prix/kg (€)</label>
                    <input type="number" id="add_price" value="25">
                </div>
            </div>
            <div class="form-group">
                <label>Fournisseur</label>
                <input type="text" id="add_supplier" placeholder="Amazon, Sunlu...">
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="uiAjouterStock()">
                Enregistrer l'achat
            </button>
        </aside>

        <section>
            <div class="card">
                <h3 style="margin-bottom: 20px;">📋 Inventaire Actuel</h3>
                <div style="overflow-x: auto;">
                    <table style="margin: 0;">
                        <thead>
                            <tr>
                                <th>Référence</th>
                                <th>Stock</th>
                                <th>Prix/kg</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="stock_body">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="card" style="margin-top: 30px; border-left: 4px solid var(--orange);">
                <h3 style="margin-bottom: 15px;">⏳ Sorties à valider (Devis)</h3>
                <p style="font-size: 0.9rem; color: #666; margin-bottom: 15px;">
                    Ces quantités seront déduites du stock une fois le projet validé.
                </p>
                <div id="attente_list">
                    </div>
            </div>
        </section>

    </div>
</main>

<script src="stock.js"></script>
</body>
</html>
